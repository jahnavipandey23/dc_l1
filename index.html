<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow — Simple Task Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --navy-950: #10151d;   
    --navy-900: #161c26;  
    --navy-800: #1f2733;  
    --navy-700: #2a3542; 
    --teal-500: #2dd4bf; 
    --teal-600: #17a690; 
    --teal-100: #d6f5f0; 
    --cream-100: #f4efe4;
    --cream-200: #eae3d3; 
    --text-light: #eef1f5;
    --text-muted: #8b93a1;
    --text-dark: #1c2430; 
    --text-dark-muted: #6b6455;

    --radius-lg: 18px;
    --radius-md: 12px;
    --font-heading: 'Poppins', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--navy-950);
    color: var(--text-light);
    min-height: 100vh;
  }

  .app {
    display: grid;
    grid-template-columns: 84px 1fr; /* sidebar width, then rest */
    min-height: 100vh;
  }

  .sidebar {
    background: var(--navy-900);
    border-right: 1px solid var(--navy-700);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 0;
    gap: 28px;
  }

  .sidebar .logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--teal-500);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-heading);
    font-weight: 700;
    color: var(--navy-950);
    font-size: 18px;
  }

  .sidebar nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .sidebar .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 19px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .sidebar .icon-btn:hover,
  .sidebar .icon-btn.active {
    background: var(--navy-800);
    color: var(--teal-500);
  }

  /* ---- Main content wrapper ---- */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0; 
  }

  /* ---- Topbar ---- */
  .topbar {
    background: var(--navy-900);
    border-bottom: 1px solid var(--navy-700);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .topbar h1 {
    font-family: var(--font-heading);
    font-size: 20px;
    font-weight: 600;
    margin-right: auto;
  }

  .search-box {
    flex: 1;
    max-width: 420px;
    background: var(--navy-800);
    border: 1px solid var(--navy-700);
    border-radius: 999px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-light);
    font-family: var(--font-body);
    font-size: 14px;
    width: 100%;
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--teal-500);
    color: var(--navy-950);
    font-family: var(--font-heading);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .content {
    padding: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }

  .card {
    border-radius: var(--radius-lg);
    padding: 22px;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-header h2 {
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 600;
  }

  .card--checklist {
    background: var(--cream-100);
    color: var(--text-dark);
  }
  .card--checklist h2 { color: var(--text-dark); }

  .progress-bar {
    height: 8px;
    background: var(--cream-200);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--teal-600);
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  .task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #ffffff;
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }

  .task-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--teal-600);
    cursor: pointer;
    flex-shrink: 0;
  }

  .task-item span {
    flex: 1;
    font-size: 14px;
  }

  .task-item.done span {
    text-decoration: line-through;
    color: var(--text-dark-muted);
  }

  .task-item button {
    background: transparent;
    border: none;
    color: var(--text-dark-muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 4px;
  }
  .task-item button:hover { color: #d64545; }

  .add-task-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .add-task-row input {
    flex: 1;
    border: 1px solid var(--cream-200);
    background: #ffffff;
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
  }

  .add-task-row button {
    background: var(--teal-600);
    color: #ffffff;
    border: none;
    border-radius: var(--radius-md);
    padding: 0 18px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .add-task-row button:hover { background: #128f7b; }

  .status-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.22);
    font-weight: 600;
  }

  /* Card 3: Stats (dark card) */
  .card--stats {
    background: var(--navy-800);
    border: 1px solid var(--navy-700);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-box {
    background: var(--navy-900);
    border-radius: var(--radius-md);
    padding: 16px 10px;
    text-align: center;
  }

  .stat-box .num {
    font-family: var(--font-heading);
    font-size: 24px;
    font-weight: 700;
    color: var(--teal-500);
  }

  .stat-box .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Card 4: Chart (dark card with teal bars) */
  .card--chart {
    background: var(--navy-800);
    border: 1px solid var(--navy-700);
  }

  .chart-area {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    min-height: 140px;
    padding-top: 10px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .bar {
    width: 100%;
    max-width: 26px;
    background: var(--navy-700);
    border-radius: 6px 6px 0 0;
    position: relative;
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .bar:hover {
    background: var(--teal-500);
    transform: scaleY(1.02);
  }

  .bar-col .day-label {
    font-size: 11px;
    color: var(--text-muted);
  }

  @media (max-width: 900px) {
    .content {
      grid-template-columns: 1fr;
    }
  }

  /* Mobile: collapse sidebar into a slim top strip,
     stack topbar items */
  @media (max-width: 600px) {
    .app {
      grid-template-columns: 1fr; /* sidebar no longer sits beside content */
    }

    .sidebar {
      flex-direction: row;
      width: 100%;
      padding: 12px 16px;
      justify-content: space-between;
      border-right: none;
      border-bottom: 1px solid var(--navy-700);
    }

    .sidebar nav {
      flex-direction: row;
      flex: none;
    }

    .topbar {
      padding: 14px 16px;
    }

    .topbar h1 { width: 100%; order: -1; margin-bottom: 6px; }

    .content { padding: 16px; gap: 16px; }

    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="logo">T</div>
  </aside>

  <!-- ============ MAIN AREA ============ -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h1>TaskFlow</h1>
      <div class="search-box">
        <span>🔎</span>
        <input type="text" id="searchInput" placeholder="Search your tasks..." />
      </div>
      <div class="avatar">JD</div>
    </header>

    <!-- Card grid -->
    <main class="content">

      <!-- CARD 1: Checklist -->
      <section class="card card--checklist">
        <div class="card-header">
          <h2>Today's Checklist</h2>
          <span id="progressText">0% complete</span>
        </div>

        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressFill" style="width: 0%;"></div>
        </div>

        <ul class="task-list" id="taskList">

        </ul>

        <div class="add-task-row">
          <input type="text" id="newTaskInput" placeholder="Add a new task..." />
          <button id="addTaskBtn">Add</button>
        </div>
      </section>


      <!-- CARD 3: Stats -->
      <section class="card card--stats">
        <div class="card-header">
          <h2>Quick Stats</h2>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="num" id="statTotal">0</div>
            <div class="label">Total Tasks</div>
          </div>
          <div class="stat-box">
            <div class="num" id="statDone">0</div>
            <div class="label">Completed</div>
          </div>
          <div class="stat-box">
            <div class="num" id="statPending">0</div>
            <div class="label">Pending</div>
          </div>
        </div>
      </section>

      <!-- CARD 4: Chart -->
      <section class="card card--chart">
        <div class="card-header">
          <h2>Tasks Completed This Week</h2>
        </div>
        <div class="chart-area" id="chartArea">
          
        </div>
      </section>

    </main>
  </div>
</div>

<script>
  
let tasks = [];

  // Dummy chart data: tasks completed per day this week
  const chartData = [
    { day: "Mon", value: 4 },
    { day: "Tue", value: 7 },
    { day: "Wed", value: 3 },
    { day: "Thu", value: 8 },
    { day: "Fri", value: 6 },
    { day: "Sat", value: 2 },
    { day: "Sun", value: 5 },
  ];

  
  const taskListEl = document.getElementById("taskList");
  const progressFillEl = document.getElementById("progressFill");
  const progressTextEl = document.getElementById("progressText");
  const statTotalEl = document.getElementById("statTotal");
  const statDoneEl = document.getElementById("statDone");
  const statPendingEl = document.getElementById("statPending");
  const newTaskInput = document.getElementById("newTaskInput");
  const addTaskBtn = document.getElementById("addTaskBtn");
  const searchInput = document.getElementById("searchInput");
  const chartAreaEl = document.getElementById("chartArea");


function renderTasks() {

    taskListEl.innerHTML = "";

    const search = searchInput.value.toLowerCase();

    tasks.forEach((task,index)=>{

        if(!task.text.toLowerCase().includes(search)) return;

        const li=document.createElement("li");
        li.className="task-item"+(task.done?" done":"");

        li.innerHTML=`
            <input type="checkbox" ${task.done?"checked":""}>
            <span>${task.text}</span>
            <button>✕</button>
        `;

        li.querySelector("input").onchange=()=>{
            tasks[index].done=!tasks[index].done;
            updateStats();
            renderTasks();
            renderChart();
        };

        li.querySelector("button").onclick=()=>{
            tasks.splice(index,1);
            updateStats();
            renderTasks();
            renderChart();
        };

        taskListEl.appendChild(li);
    });

}

 function updateStats(){

    const total=tasks.length;
    const done=tasks.filter(t=>t.done).length;
    const pending=total-done;

    const percent=total===0?0:Math.round(done/total*100);

    progressFillEl.style.width=percent+"%";
    progressTextEl.textContent=percent+"% complete";

    statTotalEl.textContent=total;
    statDoneEl.textContent=done;
    statPendingEl.textContent=pending;
}
  // ---- 5. Add a new task ----
  function addTask() {
    const text = newTaskInput.value.trim();
    if (text === "") return; // ignore empty input

    tasks.push({ text: text, done: false });
    newTaskInput.value = "";

    renderTasks();
    updateStats();
  }

  addTaskBtn.addEventListener("click", addTask);

  // Allow pressing "Enter" to add a task too
  newTaskInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") addTask();
  });

  // Re-render the list whenever the search box changes
  searchInput.addEventListener("input", renderTasks);

  // ---- 6. Draw the simple bar chart ----
  function renderChart(){

    chartAreaEl.innerHTML="";

    const completed=tasks.filter(t=>t.done).length;

    const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

    const today=new Date().getDay();

    const data=[0,0,0,0,0,0,0];

    data[today===0?6:today-1]=completed;

    const max=Math.max(...data,1);

    data.forEach((value,index)=>{

        const col=document.createElement("div");
        col.className="bar-col";

        col.innerHTML=`
            <div class="bar"
            style="
            height:${20+(value/max)*120}px;
            background:#2dd4bf;
            width:26px;
            border-radius:6px 6px 0 0;">
            </div>

            <span class="day-label">${days[index]}</span>
        `;

        chartAreaEl.appendChild(col);

    });

}

  // ---- 8. Run everything once the page loads ----
  renderTasks();
updateStats();
renderChart();
</script>

</body>
</html>
